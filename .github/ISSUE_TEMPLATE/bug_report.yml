name: Bug report
description: Report a problem with transceiver-exporter
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to file a bug report. Please fill in as much
        of the following as you can.
  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: A clear description of the bug, including any error output.
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: What did you expect to happen?
    validations:
      required: true
  - type: textarea
    id: repro
    attributes:
      label: Steps to reproduce
      description: How can we reproduce the problem? Include the flags/command used.
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: Version
      description: Output of `transceiver-exporter -version` (or the image tag).
    validations:
      required: true
  - type: input
    id: environment
    attributes:
      label: Environment
      description: OS / distro, kernel, hardware (switch/NIC + optics), and how it's run (binary/Docker).
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Relevant logs / metrics output
      render: shell
