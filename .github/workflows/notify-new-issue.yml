name: Notify maintainer on new issue
on:
  issues:
    types: [opened]
permissions:
  issues: write
jobs:
  assign:
    runs-on: ubuntu-24.04
    # skip bot-authored issues (e.g. Renovate's Dependency Dashboard)
    if: ${{ !endsWith(github.event.issue.user.login, '[bot]') }}
    steps:
      - name: Assign maintainer (triggers your email)
        env:
          GH_TOKEN: ${{ github.token }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
          REPO: ${{ github.repository }}
        run: gh issue edit "$ISSUE_NUMBER" --add-assignee rknightion --repo "$REPO"
