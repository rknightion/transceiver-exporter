# Publish the multi-arch image to GHCR via the shared rknightion container-publish
# reusable (native amd64+arm64 matrix, cosign signing, provenance, SBOM, Trivy).
# Called by release-please.yml when a release is created (release_tag set). Also
# workflow_dispatch-able: leave release_tag empty for an edge (:main) test build,
# or set it to re-publish a tag.
#
# NOTE: linux/arm/v7 is NOT built — the shared reusable only targets linux/amd64 and
# linux/arm64 (native runners, no QEMU). The legacy docker-publish.yaml built arm/v7
# via QEMU; that platform is dropped. See main-thread task: confirm arm/v7 drop is OK.
name: publish

on:
  workflow_call:
    inputs:
      release_tag:
        description: "Release tag to publish, e.g. v1.2.3"
        required: false
        type: string
        default: ""
  workflow_dispatch:
    inputs:
      release_tag:
        description: "Release tag (vX.Y.Z) to publish; empty = edge (:main) test build"
        required: false
        type: string
        default: ""

permissions:
  contents: read

jobs:
  image:
    permissions:
      contents: write        # attach release assets (when release_tag set)
      packages: write
      id-token: write
      attestations: write
      security-events: write
    uses: rknightion/.github/.github/workflows/container-publish.yml@main
    with:
      release-tag: ${{ inputs.release_tag }}
