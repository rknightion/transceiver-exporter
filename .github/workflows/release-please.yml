# Release automation. On every push to main, release-please maintains a "release PR" that accrues
# changes and, from the Conventional Commits since the last release, computes the next semver and
# updates CHANGELOG.md. Merging that PR tags vX.Y.Z, creates the GitHub Release (notes = that
# version's changelog section), and triggers the publish below.
#
# NB: publish runs HERE, gated on release_created — NOT via the v* tag-push event — because a tag
# created with GITHUB_TOKEN does not trigger other workflows. Likewise the release PR is opened with
# GITHUB_TOKEN, so CI does not auto-run on it; merge it as a repo admin (branch protection's
# enforce_admins=false lets admins bypass) — its content (changelog + version bump) was already
# validated when the underlying commits landed.
name: release-please

on:
  push:
    branches: [main]
  workflow_dispatch:   # manual re-trigger (e.g. after a config change)

permissions:
  contents: read

jobs:
  release-please:
    runs-on: ubuntu-latest
    permissions:
      contents: write          # create the release commit, tag, and GitHub Release
      pull-requests: write      # open/update the release PR
    outputs:
      release_created: ${{ steps.release.outputs.release_created }}
      tag_name: ${{ steps.release.outputs.tag_name }}
    steps:
      - uses: googleapis/release-please-action@45996ed1f6d02564a971a2fa1b5860e934307cf7 # v5.0.0
        id: release
        with:
          # Open the release PR under a fine-grained PAT, NOT the default GITHUB_TOKEN. PRs attributed
          # to github-actions[bot] have their workflow runs parked at "action_required" (pending
          # maintainer approval) whenever a workflow pulls in code from another repo — which our
          # shared security workflows do (uses: rknightion/.github/...). A PAT identity is treated
          # as a trusted author, so CI runs automatically (same as Renovate).
          token: ${{ secrets.RELEASE_PLEASE_TOKEN }}
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json

  # Build + push the image for the freshly-created tag. Same run as the merge that created it.
  publish:
    needs: release-please
    if: needs.release-please.outputs.release_created == 'true'
    uses: ./.github/workflows/publish.yml
    permissions:
      contents: write        # attach release assets
      packages: write
      id-token: write         # cosign keyless signing + provenance attestation
      attestations: write
      security-events: write  # Trivy SARIF upload
    with:
      release_tag: ${{ needs.release-please.outputs.tag_name }}

  # Binaries via the shared GoReleaser reusable (Linux 386/amd64/arm64/arm + checksums +
  # archive SBOMs, uploaded to the release-please release). Replaces the wangyoucao577
  # release.yaml. pre-cmd installs the pinned syft for the archive SBOMs.
  binaries:
    needs: release-please
    if: needs.release-please.outputs.release_created == 'true'
    permissions:
      contents: write # upload release assets
      id-token: write
      packages: write
    uses: rknightion/.github/.github/workflows/binaries.yml@9eaba495bc5f41c780ea4508e52ea1a20330c04f # v1.2.0
    with:
      release-tag: ${{ needs.release-please.outputs.tag_name }}
      go-version: "1.26"
      goreleaser-args: "release --clean --skip=docker"
      pre-cmd: "go install github.com/anchore/syft/cmd/syft@v1.18.1"

  # Edge build on every non-release push to main: publishes the :main multi-arch image
  # via the shared reusable (replaces the removed docker-publish.yaml main push).
  # release_created gates this vs publish, so they never both run on one push.
  edge:
    needs: release-please
    if: needs.release-please.outputs.release_created != 'true'
    uses: ./.github/workflows/publish.yml
    permissions:
      contents: write
      packages: write
      id-token: write
      attestations: write
      security-events: write
    with:
      release_tag: ""
