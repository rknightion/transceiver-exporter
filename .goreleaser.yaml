# GoReleaser config for transceiver-exporter binaries. Images are built separately by
# the shared container-publish reusable; this only produces the cross-compiled Linux
# binaries + checksums + archive SBOMs, uploaded to the release-please GitHub Release.
# transceiver-exporter is a Linux-only tool (reads transceiver EEPROM via ethtool), so
# only linux targets are built. Only amd64 and arm64 are shipped — 386 and arm/v7 were
# dropped to match the container-publish matrix (which is amd64 + arm64 native, no QEMU).
version: 2

before:
  hooks:
    - go mod tidy

builds:
  - env:
      - CGO_ENABLED=0
    goos:
      - linux
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w
      - -X main.version={{ .Version }}

archives:
  - formats: [tar.gz]
    name_template: >-
      {{ .ProjectName }}_
      {{- title .Os }}_
      {{- if eq .Arch "amd64" }}x86_64
      {{- else }}{{ .Arch }}{{ end }}
    files:
      - LICENSE.md
      - README.md

checksum:
  name_template: "checksums.txt"
  algorithm: sha256

sboms:
  - artifacts: archive

# Keyless cosign signature over the checksums file (GitHub OIDC). Requires id-token: write
# and cosign on PATH (the binaries reusable's install-cosign: true).
signs:
  - cmd: cosign
    signature: "${artifact}.sigstore.json"
    args:
      - sign-blob
      - "--bundle=${signature}"
      - "${artifact}"
      - "--yes"
    artifacts: checksum
    output: true

snapshot:
  version_template: "{{ incpatch .Version }}-next"

changelog:
  disable: true
